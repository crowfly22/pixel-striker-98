<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL STRIKER '98</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
#c{display:block;margin:auto;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// PIXEL STRIKER '98 — Retro Arcade Soccer Shooter (v3 Reference Edition)
// ============================================================
const C = document.getElementById('c');
const X = C.getContext('2d');

// Low-res render target for pixel art
const W = 320, H = 240;
const buf = document.createElement('canvas');
buf.width = W; buf.height = H;
const G = buf.getContext('2d');

// ============================================================
// SPRITE SYSTEM
// ============================================================
const sprites = {};
const spriteList = [
    { name: 'goalkeeper', src: 'sprites/goalkeeper.png' },
    { name: 'player_legs', src: 'sprites/player_legs.png' },
    { name: 'ball', src: 'sprites/ball.png' },
    { name: 'field', src: 'sprites/field.png' },
    { name: 'field_tiles', src: 'sprites/field_tiles.png' },
    { name: 'effects', src: 'sprites/effects.png' }
];

let allSpritesLoaded = false;

function loadSprites() {
    return new Promise((resolve) => {
        let loaded = 0;
        spriteList.forEach(s => {
            const img = new Image();
            img.onload = () => {
                sprites[s.name] = img;
                loaded++;
                if (loaded === spriteList.length) {
                    allSpritesLoaded = true;
                    resolve();
                }
            };
            img.onerror = () => {
                loaded++;
                if (loaded === spriteList.length) {
                    allSpritesLoaded = true;
                    resolve();
                }
            };
            img.src = s.src;
        });
    });
}

// ============================================================
// AUDIO SYSTEM
// ============================================================
const actx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, dur, type = 'square', vol = 0.15) {
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
}

function kickSound() {
    playTone(80, 0.15, 'sawtooth', 0.3);
    setTimeout(() => playTone(60, 0.1, 'square', 0.2), 50);
}

function netSound() {
    playTone(200, 0.3, 'sine', 0.15);
    playTone(300, 0.2, 'sine', 0.1);
}

function postSound() {
    playTone(800, 0.05, 'square', 0.4);
    setTimeout(() => playTone(600, 0.3, 'triangle', 0.2), 50);
    setTimeout(() => playTone(400, 0.2, 'triangle', 0.15), 100);
}

function crowdRoar() {
    for (let i = 0; i < 8; i++) {
        setTimeout(() => playTone(100 + Math.random() * 200, 0.5, 'sawtooth', 0.04), i * 60);
    }
}

function whistle() {
    playTone(1200, 0.1, 'sine', 0.2);
    setTimeout(() => playTone(1400, 0.3, 'sine', 0.25), 120);
}

function missSound() {
    playTone(300, 0.1, 'triangle', 0.1);
    setTimeout(() => playTone(200, 0.2, 'triangle', 0.08), 100);
}

// ============================================================
// GAME STATE
// ============================================================
let state = 'MENU';
let score = 0, shots = 0, streak = 0, bestStreak = 0, round = 0;
const MAX_ROUNDS = 10;
let aimX = W / 2, aimY = H / 2 - 30;
let ballX, ballY, ballZ, ballVX, ballVY, ballVZ;
let ballTrail = [];
let kickTimer = 0, flightTimer = 0;
let resultTimer = 0;
let outcome = '';
let keeperX = W / 2, keeperTargetX = W / 2, keeperDiveDir = 0, keeperDiveY = 0;
let keeperDiving = false;
let camBob = 0, camShake = 0, camShakeDecay = 0.9;
let crowdExcitement = 0;
let particles = [];
let netBulge = 0;
let postFlash = 0;
let slowMo = false, slowMoTimer = 0;
let curvedShot = false, curveAmount = 0;
let kickPhase = 0;
let legAngle = 0;
let crtIntensity = 0.3;
let frameCount = 0;
let ballFrame = 0;

// Crowd data - dense and colorful
const crowdRows = [];
const crowdColors = ['#e74c3c','#3498db','#f1c40f','#2ecc71','#9b59b6','#e67e22','#ecf0f1','#1abc9c','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#dfe6e9','#fd79a8','#6c5ce7'];
for (let row = 0; row < 8; row++) {
    const people = [];
    for (let i = 0; i < 50; i++) {
        people.push({
            x: i * 6.5 + (row % 2) * 3,
            y: 15 + row * 8,
            phase: Math.random() * Math.PI * 2,
            color: crowdColors[Math.floor(Math.random() * crowdColors.length)],
            headSize: 2 + Math.random() * 0.5
        });
    }
    crowdRows.push(people);
}

// Stadium lights
const lights = [
    {x: 25, y: 5}, {x: 95, y: 3}, {x: 225, y: 3}, {x: 295, y: 5}
];

// ============================================================
// DRAWING FUNCTIONS
// ============================================================

// Draw stadium background (matches reference)
function drawStadium() {
    // Dark blue sky
    G.fillStyle = '#0a1628';
    G.fillRect(0, 0, W, 80);

    // Stadium structure - gray concrete
    G.fillStyle = '#2c3e50';
    G.fillRect(0, 10, W, 70);
    
    // Upper seating (dark blue)
    G.fillStyle = '#1a252f';
    G.fillRect(0, 8, W, 15);

    // Floodlights with LED panels
    lights.forEach(l => {
        // Pole
        G.fillStyle = '#34495e';
        G.fillRect(l.x - 1, l.y, 3, 35);
        
        // LED panel
        G.fillStyle = '#ecf0f1';
        G.fillRect(l.x - 8, l.y - 2, 18, 8);
        
        // LED grid
        for (let gx = 0; gx < 4; gx++) {
            for (let gy = 0; gy < 2; gy++) {
                G.fillStyle = '#fff';
                G.fillRect(l.x - 7 + gx * 4, l.y - 1 + gy * 3, 3, 2);
            }
        }
        
        // Light glow
        const glow = G.createRadialGradient(l.x, l.y + 5, 0, l.x, l.y + 5, 40);
        glow.addColorStop(0, 'rgba(255,255,200,0.15)');
        glow.addColorStop(1, 'rgba(255,255,100,0)');
        G.fillStyle = glow;
        G.fillRect(l.x - 40, l.y - 35, 80, 80);
    });

    // Dense colorful crowd
    crowdRows.forEach((row, ri) => {
        row.forEach(p => {
            const bounce = Math.sin(frameCount * 0.06 + p.phase) * (1 + crowdExcitement * 4);
            const cy = p.y + bounce;
            
            // Body
            G.fillStyle = p.color;
            G.fillRect(p.x - 1, cy, 3, 5);
            
            // Head
            G.fillStyle = '#f0d0a0';
            G.fillRect(p.x - 0.5, cy - 2, 2, 2);
        });
    });

    // Stadium stairs/structures
    G.fillStyle = '#34495e';
    G.fillRect(10, 20, 30, 40);
    G.fillRect(W - 40, 20, 30, 40);
    G.fillRect(140, 15, 40, 45);
}

// Draw field (matches reference)
function drawField() {
    const fieldTop = 80;
    
    // Field sprite or procedural
    if (sprites.field) {
        G.drawImage(sprites.field, 0, fieldTop, W, H - fieldTop);
        // Darken slightly for perspective
        const overlay = G.createLinearGradient(0, fieldTop, 0, H);
        overlay.addColorStop(0, 'rgba(0,0,0,0.1)');
        overlay.addColorStop(1, 'rgba(0,0,0,0.3)');
        G.fillStyle = overlay;
        G.fillRect(0, fieldTop, W, H - fieldTop);
    } else {
        // Procedural bright lime green field
        const fieldGrad = G.createLinearGradient(0, fieldTop, 0, H);
        fieldGrad.addColorStop(0, '#4ade80');
        fieldGrad.addColorStop(0.3, '#22c55e');
        fieldGrad.addColorStop(0.6, '#16a34a');
        fieldGrad.addColorStop(1, '#15803d');
        G.fillStyle = fieldGrad;
        G.fillRect(0, fieldTop, W, H - fieldTop);
    }

    // Field markings (white, 4px thick as per reference)
    G.strokeStyle = 'rgba(255,255,255,0.8)';
    G.lineWidth = 1.5;
    
    // Goal line
    G.beginPath();
    G.moveTo(50, 90);
    G.lineTo(W - 50, 90);
    G.stroke();

    // Penalty box (200px wide × 150px tall in reference)
    G.beginPath();
    G.moveTo(70, 90);
    G.lineTo(50, 160);
    G.lineTo(W - 50, 160);
    G.lineTo(W - 70, 90);
    G.stroke();

    // Goal area (120px wide × 80px tall in reference)
    G.beginPath();
    G.moveTo(105, 90);
    G.lineTo(95, 125);
    G.lineTo(W - 95, 125);
    G.lineTo(W - 105, 90);
    G.stroke();

    // Penalty spot
    G.fillStyle = '#fff';
    G.fillRect(W / 2 - 1, 130, 3, 3);

    // Center circle (semicircle visible)
    G.beginPath();
    G.arc(W / 2, 160, 25, Math.PI, 0);
    G.strokeStyle = 'rgba(255,255,255,0.6)';
    G.stroke();

    // Halfway line (dashed)
    G.setLineDash([3, 3]);
    G.beginPath();
    G.moveTo(0, 160);
    G.lineTo(W, 160);
    G.stroke();
    G.setLineDash([]);
}

// Draw goal (matches reference - white frame, dark mesh net)
function drawGoal() {
    const gx1 = 100, gx2 = W - 100;
    const gy = 82;
    const gh = 35;

    // Net background (dark gray)
    G.fillStyle = '#1a1a2e';
    G.fillRect(gx1 + 3, gy, gx2 - gx1 - 6, gh);
    
    // Net mesh (12px grid as per reference)
    G.strokeStyle = 'rgba(255,255,255,0.12)';
    G.lineWidth = 0.5;
    for (let x = gx1 + 8; x < gx2; x += 8) {
        G.beginPath();
        G.moveTo(x, gy);
        G.lineTo(x, gy + gh);
        G.stroke();
    }
    for (let y = gy; y < gy + gh; y += 6) {
        G.beginPath();
        G.moveTo(gx1, y);
        G.lineTo(gx2, y);
        G.stroke();
    }

    // Net bulge effect
    if (netBulge > 0) {
        G.fillStyle = `rgba(255,255,255,${netBulge * 0.15})`;
        G.beginPath();
        G.arc(W / 2, gy + 15, 20 * netBulge, 0, Math.PI * 2);
        G.fill();
        netBulge *= 0.95;
    }

    // Goal posts (white, 6-8px thick as per reference)
    G.fillStyle = '#fff';
    G.fillRect(gx1, gy, 4, gh); // Left post
    G.fillRect(gx2 - 4, gy, 4, gh); // Right post
    G.fillRect(gx1, gy, gx2 - gx1, 4); // Crossbar

    // Post flash
    if (postFlash > 0) {
        G.fillStyle = `rgba(255,255,0,${postFlash})`;
        G.fillRect(gx1 - 3, gy - 3, 10, gh + 6);
        G.fillRect(gx2 - 7, gy - 3, 10, gh + 6);
        G.fillRect(gx1 - 3, gy - 3, gx2 - gx1 + 6, 10);
        postFlash *= 0.9;
    }
}

// Draw goalkeeper (using sprite)
function drawKeeper() {
    const kx = keeperX;
    const ky = 92 + keeperDiveY;
    
    if (sprites.goalkeeper) {
        const srcW = sprites.goalkeeper.width / 3;
        const srcH = sprites.goalkeeper.height;
        
        let frame = 0;
        if (keeperDiving) {
            frame = keeperDiveDir < 0 ? 1 : 2;
        }
        
        const srcX = frame * srcW;
        const destW = 20;
        const destH = 30;
        
        G.drawImage(
            sprites.goalkeeper,
            srcX, 0, srcW, srcH,
            kx - destW/2, ky - destH + 5, destW, destH
        );
    } else {
        // Fallback: procedural goalkeeper (green jersey)
        G.fillStyle = '#27ae60';
        G.fillRect(kx - 5, ky - 12, 10, 14);
        G.fillStyle = '#f0d0a0';
        G.fillRect(kx - 3, ky - 16, 6, 5);
        G.fillStyle = '#2c3e50';
        G.fillRect(kx - 4, ky + 2, 8, 5);
        
        if (keeperDiving) {
            G.fillStyle = '#2ecc71';
            G.fillRect(kx - 10 + keeperDiveDir * 5, ky - 8, 5, 3);
            G.fillRect(kx + 5 + keeperDiveDir * 5, ky - 8, 5, 3);
        }
    }
}

// Draw player characters (matches reference - blue shorts, peach skin, black boots)
function drawPlayerLegs() {
    const baseY = H - 25;
    const bob = Math.sin(camBob) * 1.5;
    
    if (sprites.player_legs) {
        const cols = 6;
        const srcW = sprites.player_legs.width / cols;
        const srcH = sprites.player_legs.height / 3;
        
        let frame = 0;
        if (state === 'AIMING') {
            frame = Math.floor(frameCount / 8) % 4;
        } else if (state === 'KICKING') {
            if (kickPhase === 1) frame = 4 + Math.floor(legAngle * 3);
            else if (kickPhase === 2) frame = 8;
            else if (kickPhase === 3) frame = 9 + Math.floor(legAngle * 2);
        } else if (state === 'FLIGHT') {
            frame = 12;
        }
        
        const col = frame % cols;
        const row = Math.floor(frame / cols);
        const srcX = col * srcW;
        const srcY = row * srcH;
        
        const destW = 30;
        const destH = 45;
        
        // Left player
        G.drawImage(
            sprites.player_legs,
            srcX, srcY, srcW, srcH,
            110, baseY - 30 + bob, destW, destH
        );
        
        // Right player
        G.drawImage(
            sprites.player_legs,
            srcX, srcY, srcW, srcH,
            W - 140, baseY - 30 + bob, destW, destH
        );
    } else {
        // Fallback: procedural (matches reference - blue shorts, peach skin, black boots)
        // Left player
        G.fillStyle = '#3498db'; // Blue shorts
        G.fillRect(115, baseY - 20 + bob, 14, 12);
        G.fillStyle = '#f0d0a0'; // Peach skin
        G.fillRect(117, baseY - 8 + bob, 10, 10);
        G.fillStyle = '#000'; // Black boots
        G.fillRect(117, baseY + 2 + bob, 10, 6);
        
        // Right player
        G.fillStyle = '#3498db';
        G.fillRect(W - 130, baseY - 20 + bob, 14, 12);
        G.fillStyle = '#f0d0a0';
        G.fillRect(W - 128, baseY - 8 + bob, 10, 10);
        G.fillStyle = '#000';
        G.fillRect(W - 128, baseY + 2 + bob, 10, 6);
    }
    
    // Ball at feet (when aiming)
    if (state === 'AIMING') {
        drawBallSprite(W / 2, baseY + 3, 5);
    }
}

// Ball sprite
function drawBallSprite(x, y, r) {
    // Shadow
    G.fillStyle = 'rgba(0,0,0,0.3)';
    G.beginPath();
    G.ellipse(x + 1, y + r + 1, r * 0.8, r * 0.3, 0, 0, Math.PI * 2);
    G.fill();

    if (sprites.ball) {
        const cols = 6;
        const srcW = sprites.ball.width / cols;
        const srcH = sprites.ball.height / 3;
        
        const frame = ballFrame % 18;
        const col = frame % cols;
        const row = Math.floor(frame / cols);
        const srcX = col * srcW;
        const srcY = row * srcH;
        
        const destSize = r * 2.5;
        
        G.drawImage(
            sprites.ball,
            srcX, srcY, srcW, srcH,
            x - destSize/2, y - destSize/2, destSize, destSize
        );
    } else {
        // Fallback: procedural ball (black and white pentagon pattern)
        G.fillStyle = '#fff';
        G.beginPath();
        G.arc(x, y, r, 0, Math.PI * 2);
        G.fill();

        G.fillStyle = '#333';
        const pr = r * 0.35;
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
            const px = x + Math.cos(a) * r * 0.55;
            const py = y + Math.sin(a) * r * 0.55;
            G.beginPath();
            G.arc(px, py, pr, 0, Math.PI * 2);
            G.fill();
        }
    }
}

// Draw ball in flight
function drawBall() {
    if (state !== 'FLIGHT' && state !== 'RESULT') return;
    
    // Trail
    ballTrail.forEach((t, i) => {
        const alpha = (i / ballTrail.length) * 0.3;
        const size = (i / ballTrail.length) * 3;
        G.fillStyle = `rgba(255,255,255,${alpha})`;
        G.beginPath();
        G.arc(t.x, t.y, size, 0, Math.PI * 2);
        G.fill();
    });

    const scale = Math.max(0.3, 1 - ballZ * 0.008);
    const r = 5 * scale;
    drawBallSprite(ballX, ballY, r);

    if (curvedShot) {
        G.strokeStyle = 'rgba(255,200,0,0.3)';
        G.lineWidth = 1;
        G.beginPath();
        ballTrail.forEach((t, i) => {
            if (i === 0) G.moveTo(t.x, t.y);
            else G.lineTo(t.x, t.y);
        });
        G.stroke();
    }
}

// Particles
function spawnParticles(x, y, count, color, speed = 2) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * speed,
            vy: (Math.random() - 0.5) * speed - 1,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            color,
            size: 1 + Math.random() * 2
        });
    }
}

function spawnConfetti(x, y, count) {
    const colors = ['#e74c3c','#3498db','#f1c40f','#2ecc71','#9b59b6','#e67e22','#fff'];
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x + (Math.random() - 0.5) * 100,
            y: y - Math.random() * 20,
            vx: (Math.random() - 0.5) * 3,
            vy: -1 - Math.random() * 3,
            life: 1,
            decay: 0.005 + Math.random() * 0.01,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 1 + Math.random() * 2,
            gravity: 0.05
        });
    }
}

function updateParticles() {
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.gravity) p.vy += p.gravity;
        p.life -= p.decay;
        return p.life > 0;
    });
}

function drawParticles() {
    particles.forEach(p => {
        G.globalAlpha = p.life;
        G.fillStyle = p.color;
        G.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    G.globalAlpha = 1;
}

// Crosshair
function drawCrosshair() {
    if (state !== 'AIMING') return;
    
    const cx = aimX, cy = aimY;
    G.strokeStyle = '#fff';
    G.lineWidth = 0.5;
    
    G.beginPath();
    G.moveTo(cx - 5, cy); G.lineTo(cx - 2, cy);
    G.moveTo(cx + 2, cy); G.lineTo(cx + 5, cy);
    G.moveTo(cx, cy - 5); G.lineTo(cx, cy - 2);
    G.moveTo(cx, cy + 2); G.lineTo(cx, cy + 5);
    G.stroke();
    
    G.fillStyle = '#ff0';
    G.fillRect(cx - 0.5, cy - 0.5, 1, 1);
}

// HUD (matches reference)
function drawHUD() {
    // Top HUD bar (black, 40px tall as per reference)
    G.fillStyle = 'rgba(0,0,0,0.85)';
    G.fillRect(0, 0, W, 18);
    
    // GOAL counter
    G.fillStyle = '#f1c40f';
    G.font = 'bold 8px monospace';
    G.textAlign = 'left';
    G.fillText('GOAL:', 4, 12);
    G.fillStyle = '#fff';
    G.fillText(`${score}/${shots}`, 30, 12);
    
    // STREAK
    G.fillStyle = '#f1c40f';
    G.textAlign = 'center';
    G.fillText('STREAK:', W / 2 - 10, 12);
    G.fillStyle = '#fff';
    G.fillText(`${streak}`, W / 2 + 18, 12);
    
    // ROUND
    G.fillStyle = '#f1c40f';
    G.textAlign = 'right';
    G.fillText('ROUND:', W - 30, 12);
    G.fillStyle = '#fff';
    G.fillText(`${round}/${MAX_ROUNDS}`, W - 4, 12);

    // Bottom UI labels (matches reference)
    // Left: "GOAL!" and "PIXEL FOOTBALL"
    G.fillStyle = '#3498db';
    G.fillRect(4, H - 14, 35, 12);
    G.fillStyle = '#fff';
    G.font = 'bold 6px monospace';
    G.textAlign = 'left';
    G.fillText('GOAL!', 6, H - 6);
    
    G.fillStyle = '#8b4513';
    G.fillRect(42, H - 14, 60, 12);
    G.fillStyle = '#fff';
    G.fillText('PIXEL FOOTBALL', 44, H - 6);
    
    // Right: "8BIT FOOTBALL" and "PLAY HARD"
    G.fillStyle = '#3498db';
    G.fillRect(W - 65, H - 14, 60, 12);
    G.fillStyle = '#fff';
    G.textAlign = 'right';
    G.fillText('8BIT FOOTBALL', W - 8, H - 6);
    
    G.fillStyle = '#f1c40f';
    G.fillRect(W - 130, H - 14, 60, 12);
    G.fillStyle = '#000';
    G.textAlign = 'right';
    G.fillText('PLAY HARD', W - 70, H - 6);

    // Streak fire effect
    if (streak >= 3) {
        G.fillStyle = `rgba(255,${100 + Math.sin(frameCount * 0.2) * 50},0,${0.3 + Math.sin(frameCount * 0.1) * 0.1})`;
        G.font = 'bold 10px monospace';
        G.textAlign = 'center';
        G.fillText(`🔥 ${streak}x COMBO! 🔥`, W / 2, H - 25);
    }
}

// Result text
function drawResult() {
    if (state !== 'RESULT') return;
    
    const alpha = Math.min(1, resultTimer / 20);
    
    let text = '', color = '#fff', size = 16;
    switch (outcome) {
        case 'GOAL':
            text = '⚽ GOOOOAL! ⚽';
            color = '#2ecc71';
            size = 18;
            break;
        case 'SAVE':
            text = '🧤 SAVED! 🧤';
            color = '#e74c3c';
            break;
        case 'POST':
            text = '💥 HIT THE POST! 💥';
            color = '#f39c12';
            break;
        case 'MISS':
            text = '💨 MISS! 💨';
            color = '#95a5a6';
            break;
        case 'CURVED':
            text = '🌀 CURVED GOAL! 🌀';
            color = '#9b59b6';
            size = 18;
            break;
    }

    G.globalAlpha = alpha;
    G.fillStyle = color;
    G.font = `bold ${size}px monospace`;
    G.textAlign = 'center';
    G.fillText(text, W / 2, H / 2 - 20);

    G.fillStyle = '#fff';
    G.font = '8px monospace';
    if (outcome === 'GOAL' || outcome === 'CURVED') {
        G.fillText(`${score} GOALS!`, W / 2, H / 2);
    } else {
        G.fillText('Click to continue...', W / 2, H / 2);
    }
    G.globalAlpha = 1;
}

// CRT effect
function drawCRT() {
    G.fillStyle = `rgba(0,0,0,${crtIntensity * 0.3})`;
    for (let y = 0; y < H; y += 2) {
        G.fillRect(0, y, W, 1);
    }

    const vg = G.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.4)');
    G.fillStyle = vg;
    G.fillRect(0, 0, W, H);

    if (camShake > 0.5) {
        G.globalCompositeOperation = 'lighten';
        G.fillStyle = `rgba(255,0,0,${camShake * 0.02})`;
        G.fillRect(1, 0, W, H);
        G.fillStyle = `rgba(0,0,255,${camShake * 0.02})`;
        G.fillRect(-1, 0, W, H);
        G.globalCompositeOperation = 'source-over';
    }
}

// Menu screen
function drawMenu() {
    G.fillStyle = '#0a0a1a';
    G.fillRect(0, 0, W, H);

    const previewY = H * 0.6;
    G.fillStyle = '#1a5c1a';
    G.fillRect(0, previewY, W, H - previewY);

    G.strokeStyle = '#fff';
    G.lineWidth = 2;
    G.beginPath();
    G.moveTo(80, previewY);
    G.lineTo(80, previewY + 40);
    G.moveTo(W - 80, previewY);
    G.lineTo(W - 80, previewY + 40);
    G.moveTo(80, previewY);
    G.lineTo(W - 80, previewY);
    G.stroke();

    G.fillStyle = '#f1c40f';
    G.font = 'bold 24px monospace';
    G.textAlign = 'center';
    G.fillText('PIXEL STRIKER', W / 2, 60);

    G.fillStyle = '#e74c3c';
    G.font = 'bold 14px monospace';
    G.fillText("'98", W / 2, 78);

    G.fillStyle = '#aaa';
    G.font = '7px monospace';
    G.fillText('RETRO ARCADE SOCCER SHOOTER', W / 2, 95);

    const ballBob = Math.sin(frameCount * 0.05) * 5;
    drawBallSprite(W / 2, 120 + ballBob, 8);

    G.fillStyle = '#fff';
    G.font = '8px monospace';
    G.fillText('MOUSE / ARROWS — AIM', W / 2, 155);
    G.fillText('SPACE — SHOOT', W / 2, 170);
    G.fillText('CLICK — RESTART', W / 2, 185);

    const blink = Math.sin(frameCount * 0.08) > 0;
    if (blink) {
        G.fillStyle = '#2ecc71';
        G.font = 'bold 10px monospace';
        G.fillText('>> PRESS SPACE TO KICK OFF <<', W / 2, 215);
    }

    drawCRT();
}

// Game over screen
function drawGameOver() {
    G.fillStyle = 'rgba(0,0,0,0.8)';
    G.fillRect(0, 0, W, H);

    G.fillStyle = '#f1c40f';
    G.font = 'bold 18px monospace';
    G.textAlign = 'center';
    G.fillText('FULL TIME!', W / 2, 50);

    G.fillStyle = '#fff';
    G.font = '12px monospace';
    G.fillText(`FINAL SCORE: ${score}/${MAX_ROUNDS}`, W / 2, 80);

    const acc = shots > 0 ? Math.round((score / shots) * 100) : 0;
    G.fillText(`ACCURACY: ${acc}%`, W / 2, 100);
    G.fillText(`BEST STREAK: ${bestStreak}`, W / 2, 118);

    let rating = '🐣 ROOKIE';
    if (score >= 3) rating = '⚽ AMATEUR';
    if (score >= 5) rating = '🌟 SEMI-PRO';
    if (score >= 7) rating = '💎 PRO';
    if (score >= 9) rating = '👑 LEGEND';
    if (score === 10) rating = '🏆 PERFECT!';

    G.fillStyle = '#f1c40f';
    G.font = 'bold 12px monospace';
    G.fillText(rating, W / 2, 145);

    const blink = Math.sin(frameCount * 0.08) > 0;
    if (blink) {
        G.fillStyle = '#2ecc71';
        G.font = '10px monospace';
        G.fillText('CLICK TO PLAY AGAIN', W / 2, 190);
    }

    drawCRT();
}

// ============================================================
// GAME LOGIC
// ============================================================

function updateCrowd() {
    crowdExcitement *= 0.95;
    if (outcome === 'GOAL' || outcome === 'CURVED') {
        crowdExcitement = 1;
    }
}

function startRound() {
    round++;
    if (round > MAX_ROUNDS) {
        state = 'GAMEOVER';
        whistle();
        return;
    }
    state = 'AIMING';
    ballX = W / 2;
    ballY = H - 28;
    ballZ = 0;
    ballTrail = [];
    kickPhase = 0;
    legAngle = 0;
    keeperX = W / 2;
    keeperTargetX = W / 2 + (Math.random() - 0.5) * 40;
    keeperDiving = false;
    keeperDiveDir = 0;
    keeperDiveY = 0;
    netBulge = 0;
    postFlash = 0;
    curvedShot = false;
    outcome = '';
    resultTimer = 0;
    slowMo = false;
    camShake = 0;
    ballFrame = 0;

    keeperTargetX = W / 2 + (Math.random() - 0.5) * 80;
}

function shoot() {
    if (state !== 'AIMING') return;
    state = 'KICKING';
    kickTimer = 0;
    kickSound();
    
    const targetX = aimX;
    const targetY = aimY;
    const dx = targetX - W / 2;
    const dy = targetY - (H - 28);
    
    ballVX = dx * 0.06;
    ballVY = dy * 0.05;
    ballVZ = 4 + Math.random() * 2;

    if (Math.random() < 0.1) {
        curvedShot = true;
        curveAmount = (Math.random() - 0.5) * 0.8;
    }
}

function updateFlight() {
    if (state !== 'FLIGHT') return;

    const dt = slowMo ? 0.3 : 1;
    
    ballX += ballVX * dt;
    ballY += ballVY * dt;
    ballZ += ballVZ * dt;
    ballVZ -= 0.15 * dt;
    ballVY -= 0.02 * dt;

    if (curvedShot) {
        ballVX += curveAmount * 0.1 * dt;
    }

    ballTrail.push({ x: ballX, y: ballY });
    if (ballTrail.length > 15) ballTrail.shift();

    ballFrame = (ballFrame + 1) % 18;

    if (!keeperDiving && ballZ > 2) {
        keeperDiving = true;
        keeperDiveDir = ballX < W / 2 ? -1 : 1;
    }
    if (keeperDiving) {
        keeperX += keeperDiveDir * 3 * dt;
        keeperDiveY = Math.min(8, keeperDiveY + 0.5 * dt);
    }

    if (ballY <= 95 && ballZ > 0) {
        checkOutcome();
    }

    if (ballY < 30 || ballX < 30 || ballX > W - 30 || ballZ < -5) {
        outcome = 'MISS';
        state = 'RESULT';
        missSound();
        shots++;
    }

    if (ballY < 110 && !slowMo) {
        const distToKeeper = Math.abs(ballX - keeperX);
        if (distToKeeper < 30) {
            slowMo = true;
            slowMoTimer = 30;
        }
    }
    if (slowMo) {
        slowMoTimer--;
        if (slowMoTimer <= 0) slowMo = false;
    }

    flightTimer++;
}

function checkOutcome() {
    const gx1 = 104, gx2 = W - 104;
    const gy = 82, gh = 35;

    shots++;

    const postWidth = 4;
    if ((ballX < gx1 + postWidth && ballX > gx1 - postWidth) ||
        (ballX < gx2 + postWidth && ballX > gx2 - postWidth) ||
        (ballY < gy + postWidth && ballY > gy - postWidth && ballX > gx1 && ballX < gx2)) {
        outcome = 'POST';
        postFlash = 1;
        postSound();
        camShake = 8;
        spawnParticles(ballX, ballY, 10, '#f39c12', 3);
        state = 'RESULT';
        return;
    }

    if (ballX > gx1 + 3 && ballX < gx2 - 3 && ballY > gy + 2 && ballY < gy + gh) {
        const distToKeeper = Math.abs(ballX - keeperX);
        if (distToKeeper < 15 && keeperDiving) {
            outcome = 'SAVE';
            camShake = 5;
            spawnParticles(ballX, ballY, 8, '#2ecc71', 2);
            missSound();
        } else {
            if (curvedShot) {
                outcome = 'CURVED';
                score++;
                streak++;
                spawnConfetti(W / 2, 60, 40);
                crowdRoar();
                camShake = 12;
            } else {
                outcome = 'GOAL';
                score++;
                streak++;
                spawnConfetti(W / 2, 60, 30);
                crowdRoar();
                camShake = 10;
            }
            netBulge = 1;
            netSound();
            if (streak > bestStreak) bestStreak = streak;
        }
    } else {
        outcome = 'MISS';
        missSound();
        streak = 0;
    }

    state = 'RESULT';
}

// ============================================================
// UPDATE & RENDER
// ============================================================

function update() {
    frameCount++;
    camBob += 0.05;
    camShake *= camShakeDecay;
    updateCrowd();
    updateParticles();

    if (state === 'AIMING') {
        keeperX += (keeperTargetX - keeperX) * 0.02;
        if (Math.abs(keeperX - keeperTargetX) < 2) {
            keeperTargetX = W / 2 + (Math.random() - 0.5) * 60;
        }
    }

    if (state === 'KICKING') {
        kickTimer++;
        if (kickTimer < 10) {
            kickPhase = 1;
            legAngle = kickTimer / 10;
        } else if (kickTimer < 15) {
            kickPhase = 2;
            legAngle = 1 - (kickTimer - 10) / 5;
        } else if (kickTimer < 25) {
            kickPhase = 3;
            legAngle = (kickTimer - 15) / 10;
        } else {
            state = 'FLIGHT';
            flightTimer = 0;
            kickPhase = 0;
        }
    }

    updateFlight();

    if (state === 'RESULT') {
        resultTimer++;
        if (resultTimer > 90) {
            startRound();
        }
    }

    if (state === 'AIMING') {
        camBob += 0.02;
    }
}

function render() {
    G.clearRect(0, 0, W, H);

    G.save();
    if (camShake > 0.1) {
        G.translate(
            (Math.random() - 0.5) * camShake,
            (Math.random() - 0.5) * camShake
        );
    }

    if (state === 'MENU') {
        drawMenu();
    } else if (state === 'GAMEOVER') {
        drawGameOver();
    } else {
        drawStadium();
        drawField();
        drawGoal();
        drawKeeper();
        drawBall();
        drawPlayerLegs();
        drawParticles();
        drawCrosshair();
        drawHUD();
        drawResult();
        drawCRT();
    }

    G.restore();

    X.imageSmoothingEnabled = false;
    X.clearRect(0, 0, C.width, C.height);
    X.drawImage(buf, 0, 0, C.width, C.height);
}

// Resize
function resize() {
    const ratio = W / H;
    let cw = window.innerWidth;
    let ch = window.innerHeight;
    if (cw / ch > ratio) {
        cw = ch * ratio;
    } else {
        ch = cw / ratio;
    }
    C.width = cw;
    C.height = ch;
    C.style.width = cw + 'px';
    C.style.height = ch + 'px';
    C.style.marginTop = (window.innerHeight - ch) / 2 + 'px';
    C.style.marginLeft = (window.innerWidth - cw) / 2 + 'px';
}

// Input
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        actx.resume();
        if (state === 'MENU') {
            startRound();
        } else if (state === 'AIMING') {
            shoot();
        }
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.addEventListener('mousemove', e => {
    if (state !== 'AIMING') return;
    const rect = C.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    aimX = (e.clientX - rect.left) * scaleX;
    aimY = (e.clientY - rect.top) * scaleY;
    aimX = Math.max(80, Math.min(W - 80, aimX));
    aimY = Math.max(60, Math.min(130, aimY));
});

document.addEventListener('click', e => {
    actx.resume();
    if (state === 'MENU') {
        startRound();
    } else if (state === 'GAMEOVER') {
        score = 0; shots = 0; streak = 0; bestStreak = 0; round = 0;
        state = 'MENU';
    }
});

function updateAimFromKeys() {
    if (state !== 'AIMING') return;
    const speed = 2;
    if (keys['ArrowLeft']) aimX -= speed;
    if (keys['ArrowRight']) aimX += speed;
    if (keys['ArrowUp']) aimY -= speed;
    if (keys['ArrowDown']) aimY += speed;
    aimX = Math.max(80, Math.min(W - 80, aimX));
    aimY = Math.max(60, Math.min(130, aimY));
}

// Main loop
function loop() {
    updateAimFromKeys();
    update();
    render();
    requestAnimationFrame(loop);
}

// Init
window.addEventListener('resize', resize);
resize();

// Load sprites then start
loadSprites().then(() => {
    loop();
    console.log(`
%c PIXEL STRIKER '98 %c v3 REFERENCE EDITION
 Retro Arcade Soccer Shooter
 Controls: SPACE=Shoot | Mouse/Arrows=Aim | Click=Restart
`, 'background:#f1c40f;color:#000;padding:4px 8px;font-weight:bold', '');
});
</script>
